name: Release

on:
  push:
    tags: ['v*']

# Required secrets:
#   SPARKLE_PRIVATE_KEY — base64 EdDSA private key for Sparkle update signing
#
# Not required for v0.1.0 beta (add before public GA):
#   DEVELOPER_ID_APPLICATION_CERT_P12_BASE64 / _PASSWORD / _IDENTITY
#   NOTARIZE_APPLE_ID / NOTARIZE_TEAM_ID / NOTARIZE_APP_PASSWORD

jobs:
  build-release:
    name: Build · Sign (ad-hoc) · DMG · Release
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      # Builds Swift + Rust in release mode, signs ad-hoc (no Developer ID cert in CI).
      # Ad-hoc is fine for a manual-download beta; users right-click → Open to bypass
      # Gatekeeper on first launch. Add Developer ID + notarization before public GA.
      - name: Assemble app bundle (release, ad-hoc signed)
        env:
          CODESIGN_IDENTITY: "-"
        run: bash scripts/bundle.sh --release

      - name: Create DMG
        run: bash scripts/make-dmg.sh

      - name: Generate Sparkle appcast feed
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: bash scripts/generate-appcast-entry.sh "${{ github.ref_name }}"

      # prerelease: false so releases/latest/download/appcast.xml — the SUFeedURL
      # in Info.plist — resolves to this release. GitHub's "latest" only points to
      # non-prerelease, non-draft releases. Title still marks the beta.
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          generate_release_notes: true
          files: |
            dist/TabTypist.dmg
            dist/appcast.xml
